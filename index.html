<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col md:flex-row h-screen w-full bg-neutral-950 text-neutral-300 font-sans overflow-hidden">

  <div class="w-full md:w-80 bg-neutral-900 p-6 flex flex-col overflow-y-auto border-r border-neutral-800 z-10">
    
    <div class="pb-6 border-b border-neutral-800 mb-6">
      <h1 class="text-lg font-medium text-white tracking-tight">Gravity</h1>
    </div>

    <div class="flex flex-col gap-4 mb-6 pb-6 border-b border-neutral-800">
      <div class="flex items-center justify-between">
        <h2 class="text-xs font-medium text-neutral-400 flex items-center gap-2">
          <i data-lucide="settings" class="w-3.5 h-3.5"></i> Ambiente
        </h2>
        <input type="color" id="bgColor" value="#0a0a0a" class="w-5 h-5 rounded cursor-pointer bg-neutral-800 border-0 p-0">
      </div>

      <div>
        <label class="block text-[10px] text-neutral-500 mb-1">Formato</label>
        <select id="canvasFormat" class="w-full bg-neutral-800 border border-neutral-700 rounded p-2 text-xs text-neutral-200 outline-none cursor-pointer focus:border-neutral-500">
          <option value="1920">1080 x 1920</option>
          <option value="1350">1080 x 1350</option>
        </select>
      </div>
      
      <div class="flex gap-2 w-full">
        <label class="flex-1 flex items-center justify-center h-10 transition bg-neutral-800 border border-neutral-700 border-dashed rounded cursor-pointer hover:bg-neutral-800 hover:border-neutral-500">
          <span class="text-xs text-neutral-400 flex items-center gap-2"><i data-lucide="image" class="w-3.5 h-3.5"></i> Immagine Centrale</span>
          <input type="file" id="centerImage" class="hidden" accept="image/png, image/jpeg, image/webp">
        </label>
        <button id="clearCenterBtn" class="hidden bg-neutral-800 hover:bg-neutral-700 hover:text-red-400 text-neutral-400 px-3 rounded border border-neutral-700 transition flex items-center justify-center" title="Rimuovi immagine centrale">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="flex gap-4">
        <div class="flex-1">
          <label class="block text-[10px] text-neutral-500 mb-1" id="scaleLabel">Scala (1.0x)</label>
          <input type="range" id="centerScale" min="0.2" max="3" step="0.1" value="1" class="w-full">
        </div>
        <div class="flex-1">
          <label class="block text-[10px] text-neutral-500 mb-1" id="rotationLabel">Rotazione (0°)</label>
          <input type="range" id="centerRotation" min="0" max="360" step="1" value="0" class="w-full">
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-4 mb-6 pb-6 border-b border-neutral-800">
      <h2 class="text-xs font-medium text-neutral-400 flex items-center gap-2">
        <i data-lucide="zap" class="w-3.5 h-3.5"></i> Generatore
      </h2>
      
      <div class="flex gap-2 w-full">
        <label class="flex-1 flex items-center justify-center h-10 transition bg-neutral-800 border border-neutral-700 border-dashed rounded cursor-pointer hover:bg-neutral-800 hover:border-neutral-500">
          <span class="text-xs text-neutral-400 flex items-center gap-2"><i data-lucide="layers" class="w-3.5 h-3.5"></i> Elementi Cadenti</span>
          <input type="file" id="fallingImages" multiple class="hidden" accept="image/png, image/jpeg, image/webp">
        </label>
        <button id="clearFallingBtn" class="hidden bg-neutral-800 hover:bg-neutral-700 hover:text-red-400 text-neutral-400 px-3 rounded border border-neutral-700 transition flex items-center justify-center" title="Svuota selezione immagini">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <div id="previewContainer" class="flex gap-2 overflow-x-auto pb-1 hidden"></div>

      <div>
        <label class="block text-[10px] text-neutral-500 mb-1">Stile Simulazione</label>
        <select id="physicsEffect" class="w-full bg-neutral-800 border border-neutral-700 rounded p-2 text-xs text-neutral-200 outline-none cursor-pointer focus:border-neutral-500">
          <option value="normal">Pioggia Classica</option>
          <option value="cannons">Cannoni (Incrocio)</option>
          <option value="fluid">Sabbia / Fluido</option>
          <option value="popcorn">Spawning Pop-Corn</option>
          <option value="bouncy">Gomma Rimbalzante</option>
          <option value="heavy">Piombo (Gravità Pesante)</option>
          <option value="space">Spazio (Fluttuanti)</option>
          <option value="windRight">Vento (Destra)</option>
          <option value="windLeft">Vento (Sinistra)</option>
          <option value="explosion">Esplosione</option>
          <option value="leaves">Foglie al Vento</option>
          <option value="vortex">Vortice Centrale</option>
          <option value="magnetic">Magnete Centrale</option>
        </select>
      </div>

      <div class="flex gap-4">
        <div class="flex-1">
          <label class="block text-[10px] text-neutral-500 mb-1" id="amountLabel">Quantità: 15</label>
          <input type="range" id="itemAmount" min="1" max="150" step="1" value="15" class="w-full">
        </div>
        <div class="flex-1">
          <label class="block text-[10px] text-neutral-500 mb-1" id="sizeLabel">Misura: 60px</label>
          <input type="range" id="itemSize" min="10" max="250" step="5" value="60" class="w-full">
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-4 mb-6 pb-6 border-b border-neutral-800">
      <h2 class="text-xs font-medium text-neutral-400 flex items-center gap-2">
        <i data-lucide="sliders" class="w-3.5 h-3.5"></i> Proprietà & Ostacoli
      </h2>

      <div>
        <label class="block text-[10px] text-neutral-500 mb-1">Forma Oggetti</label>
        <select id="shapeType" class="w-full bg-neutral-800 border border-neutral-700 rounded p-1.5 text-xs text-neutral-200 outline-none cursor-pointer focus:border-neutral-500">
          <option value="circle">Cerchi</option>
          <option value="rectangle">Rettangoli</option>
          <option value="mixed">Misto</option>
        </select>
      </div>

      <div class="flex flex-col gap-2 mt-2">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="modChaos" class="w-3 h-3 accent-neutral-200 rounded cursor-pointer">
          <span class="text-[11px] text-neutral-400">Caos Dimensionale (10% Giganti)</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="modExplosive" class="w-3 h-3 accent-neutral-200 rounded cursor-pointer">
          <span class="text-[11px] text-neutral-400">Collisioni Dinamiche</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="modMouse" class="w-3 h-3 accent-neutral-200 rounded cursor-pointer">
          <span class="text-[11px] text-neutral-400">Campo di Forza Mouse</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="isLooping" class="w-3 h-3 accent-neutral-200 rounded cursor-pointer">
          <span class="text-[11px] text-neutral-400">Modalità Loop</span>
        </label>
        <hr class="border-neutral-800 my-1">
        
        <button id="addRectBtn" class="w-full bg-neutral-800 border border-neutral-700 hover:bg-neutral-700 text-white py-1.5 rounded text-[11px] transition">
          + Aggiungi Rettangolo Trascinabile
        </button>

        <label class="flex items-center gap-2 cursor-pointer mt-1">
          <input type="checkbox" id="modDraw" class="w-3 h-3 accent-neutral-200 rounded cursor-pointer">
          <span class="text-[11px] text-neutral-400">Disegna Muri a Mano Libera</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="modHideObstacles" class="w-3 h-3 accent-neutral-200 rounded cursor-pointer">
          <span class="text-[11px] text-neutral-400">Nascondi Ostacoli Visivamente</span>
        </label>
        <button id="clearObstaclesBtn" class="text-[10px] text-neutral-500 hover:text-white text-left mt-1 underline transition-colors w-fit">
          Cancella tutti gli ostacoli
        </button>
      </div>
    </div>

    <div class="flex gap-2 mb-6">
      <button id="spawnBtn" class="flex-1 bg-white text-black hover:bg-neutral-200 py-2 rounded text-xs font-medium transition flex items-center justify-center gap-2">
        <i data-lucide="play" class="w-3.5 h-3.5"></i> Spawna
      </button>
      <button id="clearBtn" class="bg-neutral-800 hover:bg-neutral-700 text-neutral-300 p-2 rounded transition flex items-center justify-center" title="Pulisci Oggetti Cadenti">
        <i data-lucide="trash" class="w-3.5 h-3.5"></i>
      </button>
    </div>

    <div class="mt-auto">
      <div class="flex items-center justify-between mb-2">
        <label class="text-[10px] text-neutral-500">FPS Export</label>
        <select id="exportFps" class="bg-transparent border border-neutral-700 rounded px-1 py-0.5 text-[10px] text-neutral-300 outline-none cursor-pointer">
          <option value="12">12 fps</option>
          <option value="24">24 fps</option>
          <option value="30" selected>30 fps</option>
          <option value="60">60 fps</option>
        </select>
      </div>
      <button id="recordBtn" class="w-full py-2.5 rounded text-xs font-medium flex items-center justify-center gap-2 transition bg-white text-black hover:bg-neutral-200">
        <i data-lucide="camera" class="w-3.5 h-3.5"></i> <span id="recordText">Esporta Sequenza</span>
      </button>
      <p id="recordStatus" class="text-center text-[10px] text-neutral-500 mt-2 hidden"></p>
    </div>

  </div>

  <div id="sceneContainer" class="flex-1 relative flex items-center justify-center bg-neutral-950 overflow-hidden">
    <div id="canvasContainer" class="absolute ring-1 ring-neutral-800" style="width: 1080px; height: 1920px; overflow: hidden; transform-origin: center center;">
      <div id="placeholder-text" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none p-20 text-center z-10 text-neutral-600">
        <p class="text-2xl font-light mb-2">1080 x 1920</p>
        <p class="text-sm">Aggiungi elementi per iniziare.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
